version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tictactoe-postgres
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: nakama
      POSTGRES_PASSWORD: localpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nakama"]
      interval: 10s
      timeout: 5s
      retries: 5

  nakama:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tictactoe-nakama
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_DRIVER: postgres
      DB_URL: postgres://nakama:localpass@postgres:5432/nakama?sslmode=disable
    ports:
      - "7350:7350"
      - "7351:7351"
    volumes:
      - ./backend/build:/nakama/data/modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7350/"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  default:
    name: tictactoe-network
